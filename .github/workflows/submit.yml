name: Submit to Snorkel

on:
  workflow_dispatch:
    inputs:
      time:
        description: "Time spent on task (minutes)"
        required: true
        default: "0"
      send_to_reviewer:
        description: "Send to reviewer after evaluation"
        type: boolean
        default: true
      dry_run:
        description: "Dry run (package ZIP without uploading)"
        type: boolean
        default: false

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install STB
        run: uv tool install snorkelai-stb --find-links https://snorkel-python-wheels.s3.us-west-2.amazonaws.com/stb/index.html

      - name: Submit update to Snorkel
        env:
          SNORKEL_API_KEY: ${{ secrets.SNORKEL_API_KEY }}
        run: |
          FLAG=""
          if [ "${{ inputs.send_to_reviewer }}" = "false" ]; then
            FLAG="--no-send-to-reviewer"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            FLAG="$FLAG --dry-run"
          fi
          stb submissions update . --time ${{ inputs.time }} $FLAG
